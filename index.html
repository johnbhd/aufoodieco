<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Page || FoodieCart</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <link rel="shortcut icon" href="./imgs/aulogo.png" type="image/x-icon">
</head>

<body class="min-h-screen bg-[#1E1D27] text-gray-200">

 <div class="h-screen flex gap-3 p-3 max-w-[1720px] max-h-[900px] mx-auto my-auto">

    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="fixed inset-y-0 left-0 z-50 w-64 bg-[#1E1D27] text-gray-200
            transform -translate-x-full transition-transform duration-300
            md:translate-x-0 md:static md:w-24 px-3 py-2 flex flex-col"
    >

      <!-- Logo -->
      <img src="./imgs/aulogo.png" alt="AU LOGO" class="w-20 mx-auto my-4">

      <!-- Mobile Search -->
      <div class="relative mb-4 md:hidden">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input
          type="text"
          placeholder="Search food..."
          class="food-search w-full pl-9 pr-3 py-2 rounded-lg bg-white text-black outline-none"
        />
      </div>

      <!-- Navigation -->
      <nav class="space-y-4 py-5 text-center">
        <a href="./index.html" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Home</a>
        <a href="./orders.html" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Orders</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Profile</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Settings</a>
      </nav>
    </aside>
    <div
      id="overlay"
      class="fixed inset-0 bg-black/40 z-40 hidden md:hidden"
    ></div>
    <div
      id="toast"
      class="fixed inset-0 z-50 hidden flex items-center justify-center
            bg-black/40 backdrop-blur-sm"
    >
      <div
        id="toast-box"
        class="flex items-center gap-4
              bg-[#FFFFFF] text-[#1E1D27]
              px-6 py-4 sm:px-7 sm:py-4 lg:px-10 lg:py-6
              rounded-2xl shadow-2xl
              border border-black/10
              transition-all duration-300 scale-95 opacity-0"
      >
        <div class="flex items-center justify-center
                    w-10 h-10 lg:w-12 lg:h-12
                    rounded-full bg-green-100">
          <i class="fa-solid fa-check text-green-600 text-lg lg:text-xl"></i>
        </div>

        <span
          id="toast-message"
          class="font-semibold text-sm sm:text-base lg:text-lg"
        ></span>
      </div>
    </div>




    <!-- Main -->
    <main class="flex flex-col md:flex-row w-full bg-[#D2D2D2] rounded-bl-lg h-full overflow-y-auto md:overflow-hidden ">

      <!-- Menu -->
      <section class="w-full md:w-[70%] ">
        <nav class="bg-[#1E1D27] flex items-center justify-between p-4 border-b border-black/20">

          <div class="flex items-center gap-3">
            <button
              id="menu-btn"
              class="md:hidden text-white text-2xl focus:outline-none"
            >
              <i class="fa-solid fa-bars"></i>
            </button>

            <h4 class="font-bold text-2xl text-white ml-3 md:ml-0">AU Canteen System</h4>
          </div>

          <!-- Desktop Search -->
          <div class="relative w-96 hidden md:block">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input
              type="text"
              placeholder="Search food..."
              class="food-search w-full pl-9 pr-3 py-2 rounded-lg bg-white text-black outline-none"
            />
          </div>
        </nav>
        <div class="p-4">
            <!-- Category -->
            <div class="flex max-w-lg gap-3" id="category-filter">

                <!-- Meals -->
                <div 
                  class="category-btn flex items-center gap-2 py-2 px-4 rounded-lg bg-gray-900 cursor-pointer hover:scale-105 transition"
                  data-category="Meal"
                >
                  <i class="fa-solid fa-plate-wheat text-white"></i>
                  <h4 class="text-white font-medium text-sm md:text-lg">Meals</h4>
                </div>

                <!-- Snacks -->
                <div 
                  class="category-btn flex items-center gap-2 py-2 px-4 rounded-lg bg-gray-900 cursor-pointer hover:scale-105 transition"
                  data-category="Chips"
                >
                  <i class="fa-solid fa-cookie-bite text-white"></i>
                  <h4 class="text-white font-medium text-sm md:text-lg">Snacks</h4>
                </div>

                <!-- Drinks -->
                <div 
                  class="category-btn flex items-center gap-2 py-2 px-4 rounded-lg bg-gray-900 cursor-pointer hover:scale-105 transition"
                  data-category="Drink"
                >
                  <i class="fa-solid fa-glass-water text-white"></i>
                  <h4 class="text-white font-medium text-sm md:text-lg">Drinks</h4>
                </div>

              </div>

            <!-- Food -->
            <div id="food-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-5 overflow-y-auto h-screen pb-[10vh] md:pb-[40vh]"></div>
        </div>

    </section>

    <aside class="w-full md:w-[30%] bg-[#1E1D27] p-4 text-gray-200">
        <!-- Header -->
        <div class="flex justify-between items-center mb-4">
          <h4 class="font-semibold text-2xl">Order</h4>

        </div>

        <!-- Order Items -->
        <div id="order-cart"></div>
      </aside>

    </main>

  </div>

</body>
<script type="module" src="./script/homepage.js"></script>
</html>
