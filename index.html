<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodieCart</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body class="min-h-screen bg-[#1E1D27] text-gray-200">

 <div class="h-screen flex gap-3 p-3 max-w-[1720px] max-h-[900px] mx-auto my-auto">
    <!-- Sidebar -->
    <aside class="w-24 px-3 py-2 hidden md:flex flex-col text-gray-200 items-center">

      <img src="./imgs/aulogo.png" alt="AU LOGO" class="w-40 ">
      <nav class="space-y-4 py-5">
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Home</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Orders</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Profile</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-700 text-lg">Settings</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex flex-col md:flex-row w-full bg-[#D2D2D2] rounded-bl-lg h-full overflow-y-auto md:overflow-hidden ">

      <!-- Menu -->
      <section class="w-full md:w-[70%] ">
        <nav class="bg-[#1E1D27] flex items-center justify-between p-4 border-b border-black/20">
          <div>
            <h4 class="font-bold text-2xl">AU Canteen System</h4>
          </div>

          <!-- Search -->
          <div class="relative w-96">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input
              type="text"
              placeholder="Search food..."
              id="food-search"
              class="w-full pl-9 pr-3 py-2 rounded-lg bg-white text-black placeholder-gray-500 outline-none focus:ring-2 focus:ring-gray-400 transition"
            />
          </div>
        </nav>


        <div class="p-4">
            <!-- Category -->
            <div class="flex max-w-lg gap-3" id="category-filter">

                <!-- Meals -->
                <div 
                  class="category-btn flex items-center gap-2 py-2 px-4 rounded-lg bg-gray-900 cursor-pointer hover:scale-105 transition"
                  data-category="Meal"
                >
                  <i class="fa-solid fa-plate-wheat text-white"></i>
                  <h4 class="text-white font-medium">Meals</h4>
                </div>

                <!-- Snacks -->
                <div 
                  class="category-btn flex items-center gap-2 py-2 px-4 rounded-lg bg-gray-900 cursor-pointer hover:scale-105 transition"
                  data-category="Chips"
                >
                  <i class="fa-solid fa-cookie-bite text-white"></i>
                  <h4 class="text-white font-medium">Snacks</h4>
                </div>

                <!-- Drinks -->
                <div 
                  class="category-btn flex items-center gap-2 py-2 px-4 rounded-lg bg-gray-900 cursor-pointer hover:scale-105 transition"
                  data-category="Drink"
                >
                  <i class="fa-solid fa-glass-water text-white"></i>
                  <h4 class="text-white font-medium">Drinks</h4>
                </div>

              </div>

            <!-- Food -->
            <div id="food-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-5 overflow-y-auto h-screen pb-[40vh]"></div>
        </div>

    </section>

    <aside class="w-full md:w-[30%] bg-[#1E1D27] p-4 text-gray-200">
        <!-- Header -->
        <div class="flex justify-between items-center mb-4">
          <h4 class="font-semibold text-2xl">Order</h4>

        </div>

        <!-- Order Items -->
        <div id="order-cart"></div>
      </aside>

    </main>

  </div>

</body>
<script type="module" src="./script/homepage.js"></script>
</html>
